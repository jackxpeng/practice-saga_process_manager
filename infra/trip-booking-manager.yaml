apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-booking-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-booking-manager
  template:
    metadata:
      labels:
        app: trip-booking-manager
    spec:
      containers:
      - name: trip-booking-manager
        image: trip-booking-manager:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgresql://tripuser:trippass@trip-postgres:5432/tripdb"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq:5672/"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: trip-booking-manager
spec:
  ports:
  - port: 8000
  selector:
    app: trip-booking-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-booking-manager-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-booking-manager-consumer
  template:
    metadata:
      labels:
        app: trip-booking-manager-consumer
    spec:
      containers:
      - name: trip-booking-manager-consumer
        image: trip-booking-manager:latest
        imagePullPolicy: Never
        command: ["python", "consumer.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://tripuser:trippass@trip-postgres:5432/tripdb"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq:5672/"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-booking-manager-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-booking-manager-relay
  template:
    metadata:
      labels:
        app: trip-booking-manager-relay
    spec:
      containers:
      - name: trip-booking-manager-relay
        image: trip-booking-manager:latest
        imagePullPolicy: Never
        command: ["python", "relay.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://tripuser:trippass@trip-postgres:5432/tripdb"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq:5672/"
